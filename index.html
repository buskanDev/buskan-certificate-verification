<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buskan Certificate Verification</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    background: linear-gradient(135deg,#071a35,#102b55,#0d1f3d);
    min-height:100vh;
    overflow-x:hidden;
    color:white;
}

/* Floating Animation */

.background-circle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.05);
    animation:float 8s infinite ease-in-out;
}

.circle1{
    width:200px;
    height:200px;
    top:10%;
    left:5%;
}

.circle2{
    width:150px;
    height:150px;
    bottom:10%;
    right:5%;
    animation-delay:2s;
}

@keyframes float{
    0%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-20px);
    }
    100%{
        transform:translateY(0px);
    }
}

.container{
    position:relative;
    z-index:2;
    width:90%;
    max-width:850px;
    margin:50px auto;
    background:rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:25px;
    padding:40px;
    box-shadow:0 8px 40px rgba(0,0,0,0.4);
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0px);
    }
}

.header{
    text-align:center;
}

.logo{
    width:90px;
    height:90px;
    object-fit:contain;
    margin-bottom:15px;
}

.company-name{
    font-size:42px;
    font-weight:bold;
    letter-spacing:3px;
}

.tagline{
    color:#f4c66b;
    margin-top:5px;
    margin-bottom:30px;
    letter-spacing:2px;
}

.verify-box{
    text-align:center;
}

.verify-box h1{
    font-size:32px;
    margin-bottom:25px;
}

.input-group{
    display:flex;
    gap:15px;
    justify-content:center;
    flex-wrap:wrap;
}

input{
    width:65%;
    padding:16px;
    border:none;
    border-radius:12px;
    font-size:16px;
    outline:none;
}

button{
    background:linear-gradient(135deg,#f4c66b,#d89f2d);
    color:#071a35;
    border:none;
    padding:16px 30px;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    font-size:16px;
}

button:hover{
    transform:scale(1.05);
}

.result{
    margin-top:35px;
    display:none;
    border-radius:20px;
    overflow:hidden;
    animation:fadeIn 0.6s ease;
}

.valid{
    background:white;
    color:#222;
    padding:30px;
}

.invalid{
    background:#ffebeb;
    color:#d10000;
    padding:30px;
}

.certificate-preview{
    width:100%;
    border-radius:15px;
    margin-top:20px;
    border:2px solid #eee;
}

.download-btn{
    margin-top:20px;
    display:inline-block;
    background:#0b2c5f;
    color:white;
    text-decoration:none;
    padding:14px 25px;
    border-radius:10px;
    transition:0.3s;
}

.download-btn:hover{
    background:#123d80;
}

.info{
    margin-top:20px;
    line-height:2;
    font-size:17px;
}

.footer{
    margin-top:50px;
    border-top:1px solid rgba(255,255,255,0.1);
    padding-top:25px;
    text-align:center;
}

.contact{
    margin-bottom:20px;
    line-height:2;
}

.social-icons{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:15px;
}

.social-icons a{
    width:45px;
    height:45px;
    background:white;
    color:#071a35;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    font-size:20px;
    transition:0.3s;
    text-decoration:none;
}

.social-icons a:hover{
    transform:translateY(-5px);
    background:#f4c66b;
}

@media(max-width:768px){

    input{
        width:100%;
    }

    button{
        width:100%;
    }

    .company-name{
        font-size:30px;
    }

}

</style>
</head>
<body>

<div class="background-circle circle1"></div>
<div class="background-circle circle2"></div>

<div class="container">

    <div class="header">

        <!-- Company Logo -->
        <img src="logo.png" class="logo" alt="Company Logo">

        <div class="company-name">BUSKAN</div>

        <div class="tagline">
            INNOVATE • EMPOWER • GROW
        </div>

    </div>

    <div class="verify-box">

        <h1>Certificate Verification Portal</h1>

        <div class="input-group">

            <input type="text"
            id="certificateId"
            placeholder="Enter Certificate ID">

            <button onclick="verifyCertificate()">
                Verify Now
            </button>

        </div>

        <div id="result" class="result"></div>

    </div>

    <div class="footer">

        <div class="contact">

            <h2>Contact Information</h2>

            <p>
                <i class="fa-solid fa-globe"></i>
                www.buskan.online
            </p>

            <p>
                <i class="fa-solid fa-envelope"></i>
                info@buskan.online
            </p>

            <p>
                <i class="fa-solid fa-phone"></i>
                +91 8001330867
            </p>

            <p>
                <i class="fa-solid fa-location-dot"></i>
                West Bengal, India
            </p>

        </div>

        <h3>Follow Us</h3>

        <div class="social-icons">

            <a href="#">
                <i class="fab fa-facebook-f"></i>
            </a>

            <a href="#">
                <i class="fab fa-instagram"></i>
            </a>

            <a href="#">
                <i class="fab fa-linkedin-in"></i>
            </a>

            <a href="#">
                <i class="fab fa-youtube"></i>
            </a>

        </div>

        <p style="margin-top:25px;">
            © 2026 Buskan Solutions Pvt. Ltd.
            All Rights Reserved.
        </p>

    </div>

</div>

<script>

const certificates = {

    "BUSKAN-ENT-105": {

        name: "Sayan Sutradhar",
        department: "Entrepreneurship & Innovation",
        issueDate: "13 May 2026",
        status: "Verified",

        certificateFile: "certificates/sayan-certificate.png"
    }
    "BUSKAN-ENT-106": {

        name: "Rimpa Basak",
        department: "Entrepreneurship & Innovation",
        issueDate: "13 May 2026",
        status: "Verified",

        certificateFile: "certificates/sayan-certificate.png"
    }

};

function verifyCertificate(){

    const id =
    document.getElementById("certificateId").value.trim();

    const result =
    document.getElementById("result");

    if(certificates[id]){

        const cert = certificates[id];

        result.style.display = "block";
        result.className = "result valid";

        result.innerHTML = `

        <h2 style="color:green;">
            <i class="fa-solid fa-circle-check"></i>
            Certificate Verified
        </h2>

        <div class="info">

            <p>
                <strong>Certificate ID:</strong>
                ${id}
            </p>

            <p>
                <strong>Name:</strong>
                ${cert.name}
            </p>

            <p>
                <strong>Department:</strong>
                ${cert.department}
            </p>

            <p>
                <strong>Issue Date:</strong>
                ${cert.issueDate}
            </p>

            <p>
                <strong>Status:</strong>
                ${cert.status}
            </p>

        </div>

        <!-- Certificate Preview -->

        <img src="${cert.certificateFile}"
        class="certificate-preview">

        <!-- Download Button -->

        <a href="${cert.certificateFile}"
        download
        class="download-btn">

        <i class="fa-solid fa-download"></i>
        Download Certificate

        </a>

        `;

    }

    else{

        result.style.display = "block";
        result.className = "result invalid";

        result.innerHTML = `

        <h2>
            <i class="fa-solid fa-circle-xmark"></i>
            Invalid Certificate
        </h2>

        <p>
            No certificate found with this ID.
        </p>

        `;

    }

}

</script>

</body>
</html>
